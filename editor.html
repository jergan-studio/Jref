<!DOCTYPE html>
<html>
<head>
<title>Builder</title>

<style>
body { margin:0; font-family:Arial; background:#ddd; }
.toolbar { background:#e6c3d3; padding:10px; }
.toolbar button { margin:5px; padding:10px; }

.canvas {
  position:relative;
  height:90vh;
  background:white;
}

.box {
  position:absolute;
  border:2px dashed #aaa;
  padding:10px;
  resize:both;
  overflow:auto;
  cursor:move;
}
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="add('link')">Link</button>
  <button onclick="add('search')">Search</button>
  <button onclick="add('image')">Image</button>
  <button onclick="add('embed')">Embed</button>

  <button onclick="editStyle()">🎨 Style</button>

  <button onclick="save()">💾 Save</button>
  <button onclick="publish()">🌐 Publish</button>
</div>

<div id="canvas" class="canvas"></div>

<!-- 🔥 JREF PROMPT -->
<div id="jrefPrompt" style="
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;background:rgba(0,0,0,0.5);
align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;padding:20px;border-radius:10px;text-align:center;">
    <h3 id="jrefText"></h3>
    <input id="jrefInput" style="padding:10px;width:200px">
    <br><br>
    <button onclick="submitJref()">OK</button>
  </div>
</div>

<script>
let elements=[];

/* 🔥 CUSTOM PROMPT */
let jrefResolve;
function jrefPrompt(text){
  return new Promise(resolve=>{
    jrefResolve = resolve;
    document.getElementById("jrefText").innerText = text;
    document.getElementById("jrefInput").value = "";
    document.getElementById("jrefPrompt").style.display = "flex";
  });
}
function submitJref(){
  const val = document.getElementById("jrefInput").value;
  document.getElementById("jrefPrompt").style.display = "none";
  if(jrefResolve) jrefResolve(val);
}

/* ADD ELEMENT */
async function add(type){
  let el={
    type,x:100,y:100,w:150,h:50,
    radius:10,bg:"#fff",color:"#000"
  };

  if(type==="link"){
    el.text = await jrefPrompt("Link text:");
    el.url = await jrefPrompt("URL:");
  }

  if(type==="image"){
    el.src = await jrefPrompt("Image URL:");
    el.w=200; el.h=150;
  }

  if(type==="embed"){
    el.html = await jrefPrompt("Embed HTML:");
  }

  elements.push(el);
  render();
}

/* RENDER */
function render(){
  const c=document.getElementById("canvas");
  c.innerHTML="";

  elements.forEach((el,i)=>{
    const d=document.createElement("div");
    d.className="box";

    d.style.left=el.x+"px";
    d.style.top=el.y+"px";
    d.style.width=el.w+"px";
    d.style.height=el.h+"px";

    d.style.borderRadius=el.radius+"px";
    d.style.background=el.bg;
    d.style.color=el.color;

    if(el.type==="link") d.innerHTML=`<a href="${el.url}">${el.text}</a>`;

    if(el.type==="search"){
      d.innerHTML=`<input placeholder="Search..." style="width:100%">`;
    }

    if(el.type==="image") d.innerHTML=`<img src="${el.src}" width="100%">`;
    if(el.type==="embed") d.innerHTML=el.html;

    d.onmousedown=e=>{
      let ox=e.offsetX, oy=e.offsetY;
      document.onmousemove=e2=>{
        el.x=e2.pageX-ox;
        el.y=e2.pageY-oy;
        render();
      };
      document.onmouseup=()=>document.onmousemove=null;
    };

    d.onmouseup=()=>{
      el.w=d.offsetWidth;
      el.h=d.offsetHeight;
    };

    c.appendChild(d);
  });
}

/* STYLE */
async function editStyle(){
  let i = await jrefPrompt("Element index:");
  let el = elements[i];
  if(!el) return;

  el.radius = parseInt(await jrefPrompt("Corner radius:"));
  el.bg = await jrefPrompt("Background color:");
  el.color = await jrefPrompt("Text color:");

  render();
}

/* SAVE */
function save(){
  localStorage.setItem("jref_builder",JSON.stringify(elements));
}

/* PUBLISH */
async function publish(){
  const data=btoa(JSON.stringify(elements));
  const url=location.origin+"/view.html?id="+data;

  let name = await jrefPrompt("Page name:");

  let saved=JSON.parse(localStorage.getItem("jref_links"))||[];
  saved.push({name,url});
  localStorage.setItem("jref_links",JSON.stringify(saved));

  await jrefPrompt("Copy this link:\n"+url);
}
</script>

</body>
</html>
