<!DOCTYPE html>
<html>
<head>
<title>Builder</title>

<style>
body { margin:0; font-family:Arial; background:#ddd; }
.toolbar { background:#e6c3d3; padding:10px; }
.toolbar button { margin:5px; padding:10px; }
.canvas {
  position:relative;
  height:90vh;
  background:white;
}
.box {
  position:absolute;
  border:2px dashed #aaa;
  padding:10px;
  resize:both;
  overflow:auto;
  cursor:move;
}
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="add('link')">Link</button>
  <button onclick="add('search')">Search</button>
  <button onclick="add('image')">Image</button>
  <button onclick="add('embed')">Embed</button>

  <button onclick="theme('light')">Light</button>
  <button onclick="theme('dark')">Dark</button>

  <button onclick="save()">💾 Save</button>
  <button onclick="publish()">🌐 Publish</button>
</div>

<div id="canvas" class="canvas"></div>

<script>
let elements=[];

function add(type){
  let el={type,x:100,y:100,w:150,h:50};

  if(type==="link"){
    el.text=prompt("Text:");
    el.url=prompt("URL:");
  }
  if(type==="image"){
    el.src=prompt("Image URL:");
    el.w=200; el.h=150;
  }
  if(type==="embed"){
    el.html=prompt("Embed HTML:");
  }

  elements.push(el);
  render();
}

function render(){
  const c=document.getElementById("canvas");
  c.innerHTML="";

  elements.forEach((el,i)=>{
    const d=document.createElement("div");
    d.className="box";

    d.style.left=el.x+"px";
    d.style.top=el.y+"px";
    d.style.width=el.w+"px";
    d.style.height=el.h+"px";

    if(el.type==="link") d.innerHTML=`<a href="${el.url}">${el.text}</a>`;
    if(el.type==="search") d.innerHTML=`<input placeholder="Search">`;
    if(el.type==="image") d.innerHTML=`<img src="${el.src}" width="100%">`;
    if(el.type==="embed") d.innerHTML=el.html;

    d.onmousedown=e=>{
      let ox=e.offsetX, oy=e.offsetY;
      document.onmousemove=e2=>{
        el.x=e2.pageX-ox;
        el.y=e2.pageY-oy;
        render();
      };
      document.onmouseup=()=>document.onmousemove=null;
    };

    d.onmouseup=()=>{
      el.w=d.offsetWidth;
      el.h=d.offsetHeight;
    };

    c.appendChild(d);
  });
}

function save(){
  localStorage.setItem("jref_builder",JSON.stringify(elements));
  alert("Saved!");
}

function theme(t){
  document.body.style.background=t==="dark"?"#222":"#ddd";
}

function publish(){
  const data=btoa(JSON.stringify(elements));
  const url=location.origin+"/view.html?id="+data;

  let saved=JSON.parse(localStorage.getItem("jref_links"))||[];
  saved.push({
    name: prompt("Page name:"),
    url
  });
  localStorage.setItem("jref_links",JSON.stringify(saved));

  prompt("Copy link:",url);
}
</script>

</body>
</html>
