<!DOCTYPE html>
<html>
<head>
<title>Jref Editor</title>

<style>
body { font-family: Arial; background:#eee; }
.toolbar {
  background:#e6c3d3;
  padding:10px;
}
.toolbar button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
}
.canvas {
  margin:20px;
  min-height:400px;
  background:white;
  padding:20px;
  border-radius:10px;
}
.element {
  padding:10px;
  margin:10px 0;
  border:1px dashed #aaa;
}
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="addElement('link')">Link</button>
  <button onclick="addElement('search')">Search</button>
  <button onclick="addElement('image')">Image</button>
  <button onclick="addElement('embed')">Embed</button>
  <button onclick="save()">💾 Save</button>
</div>

<div class="canvas" id="canvas"></div>

<script>
let elements = [];

function addElement(type) {
  let data = { type };

  if (type === "link") {
    data.text = prompt("Link text:");
    data.url = prompt("URL:");
  }

  if (type === "image") {
    data.src = prompt("Image URL:");
  }

  if (type === "embed") {
    data.html = prompt("Embed HTML:");
  }

  elements.push(data);
  render();
}

function render() {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  elements.forEach(el => {
    let div = document.createElement("div");
    div.className = "element";

    if (el.type === "link") {
      div.innerHTML = `<a href="${el.url}">${el.text}</a>`;
    }

    if (el.type === "search") {
      div.innerHTML = `<input placeholder="Search...">`;
    }

    if (el.type === "image") {
      div.innerHTML = `<img src="${el.src}" width="200">`;
    }

    if (el.type === "embed") {
      div.innerHTML = el.html;
    }

    canvas.appendChild(div);
  });
}

function save() {
  localStorage.setItem("jref_page", JSON.stringify(elements));
  alert("Saved!");
}
</script>

</body>
</html>
