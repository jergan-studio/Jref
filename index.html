<!DOCTYPE html>
<html>
<head>
<title>Jref</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e9e9e9;
  text-align: center;
}

.topbar {
  background: #e6c3d3;
  padding: 10px;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  width: 50%;
  background: #f2d6e0;
  text-align: center;
}

.title {
  font-size: 60px;
  margin-top: 100px;
}

.buttons button {
  margin: 10px;
  padding: 15px;
  background: #e6c3d3;
  border: none;
  border-radius: 10px;
}

.result {
  background: white;
  margin: 10px auto;
  padding: 10px;
  width: 400px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="search" placeholder="search">
</div>

<div class="title">Jref</div>

<div class="buttons">
  <button onclick="quick('youtube')">YouTube</button>
  <button onclick="quick('github')">GitHub</button>
</div>

<div id="results"></div>

<script src="data.js"></script>

<script>
function search(query) {
  const results = database.filter(item =>
    item.title.toLowerCase().includes(query.toLowerCase()) ||
    item.description.toLowerCase().includes(query.toLowerCase())
  );

  const box = document.getElementById("results");
  box.innerHTML = "";

  if (results.length === 0) {
    box.innerHTML = "<p>No results. Searching web...</p>";

    setTimeout(() => {
      window.location.href =
        "https://www.google.com/search?q=" + encodeURIComponent(query);
    }, 800);
    return;
  }

  results.forEach(r => {
    box.innerHTML += `
      <div class="result">
        <a href="${r.url}" target="_blank">${r.title}</a>
        <p>${r.description}</p>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") search(e.target.value);
});

function quick(q) {
  search(q);
}
</script>

</body>
</html>
