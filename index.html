<!DOCTYPE html>
<html>
<head>
<title>Jref</title>

<style>
body { font-family: Arial; text-align:center; background:#e9e9e9; }
.box {
  background:white;
  margin:20px auto;
  padding:20px;
  width:300px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}
.box:hover { transform:scale(1.05); }
</style>
</head>

<body>

<h1>Jref</h1>

<div class="box" onclick="go('home')">🏠 Normal Homepage</div>
<div class="box" onclick="go('my')">📁 Your Homepages</div>
<div class="box" onclick="go('editor')">🛠 Create Homepage</div>

<script>
function go(type) {
  if(type==="home") location.href="home.html";
  if(type==="editor") location.href="editor.html";
  if(type==="my") showPages();
}

function showPages() {
  const saved = JSON.parse(localStorage.getItem("jref_links")) || [];
  document.body.innerHTML = "<h2>Your Pages</h2>";

  saved.forEach(p=>{
    const div=document.createElement("div");
    div.className="box";
    div.innerText=p.name;
    div.onclick=()=>window.open(p.url);
    document.body.appendChild(div);
  });
}
</script>

</body>
</html>
