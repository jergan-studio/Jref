<!DOCTYPE html>
<html>
<head>
<title>Jref</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #e9e9e9;
  margin: 0;
}

.title {
  font-size: 60px;
  margin-top: 80px;
}

input {
  padding: 10px;
  width: 50%;
  border-radius: 20px;
  border: none;
  background: #e6c3d3;
  margin: 5px;
  outline: none;
}

button {
  margin: 5px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #e6c3d3;
  cursor: pointer;
}

button:hover {
  background: #d9a9bf;
}

#panel {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 320px;
}

.shortcutBox {
  display: inline-flex;
  align-items: center;
  margin: 5px;
}

.deleteBtn {
  background: #ff8080;
  padding: 8px;
}
</style>
</head>

<body>

<div class="title">Jref</div>

<!-- SEARCH -->
<input id="search" placeholder="Search or shortcut">
<br>

<!-- DEFAULT BUTTONS -->
<button onclick="quick('yt')">YouTube</button>
<button onclick="quick('gh')">GitHub</button>
<button onclick="openAI()">Giznoz AI</button>

<!-- ADD -->
<button onclick="togglePanel()">＋ Add Shortcut</button>

<br><br>

<!-- CUSTOM SHORTCUTS -->
<div id="customButtons"></div>

<!-- POPUP -->
<div id="panel">

<h3>Add Shortcut</h3>

<input id="name" placeholder="shortcut name (gd)">
<input id="url" placeholder="https://example.com">

<br><br>

<button onclick="addShortcut()">Save</button>
<button onclick="togglePanel()">Close</button>

</div>

<script>
/* DEFAULT */
let shortcuts = {
  yt: "https://youtube.com",
  gh: "https://github.com",
  ai: "https://gizno-ai.vercel.app/"
};

/* LOAD SAVED */
let saved = JSON.parse(localStorage.getItem("jref_shortcuts") || "{}");

shortcuts = { ...shortcuts, ...saved };

/* RENDER BUTTONS */
function renderButtons() {

  const box = document.getElementById("customButtons");

  box.innerHTML = "";

  Object.keys(saved).forEach(key => {

    const wrap = document.createElement("div");
    wrap.className = "shortcutBox";

    /* shortcut button */
    const btn = document.createElement("button");
    btn.innerText = key;

    btn.onclick = () => {
      location.href = saved[key];
    };

    /* delete button */
    const del = document.createElement("button");
    del.innerText = "✕";
    del.className = "deleteBtn";

    del.onclick = () => {

      delete saved[key];

      localStorage.setItem(
        "jref_shortcuts",
        JSON.stringify(saved)
      );

      renderButtons();
    };

    wrap.appendChild(btn);
    wrap.appendChild(del);

    box.appendChild(wrap);
  });
}

renderButtons();

/* SEARCH */
document.getElementById("search").addEventListener("keydown", e => {

  if (e.key === "Enter") {

    const q = e.target.value.trim();

    location.href =
      "results.html?q=" +
      encodeURIComponent(q);
  }
});

/* QUICK */
function quick(key) {
  location.href = shortcuts[key];
}

/* AI */
function openAI() {
  location.href = shortcuts.ai;
}

/* PANEL */
function togglePanel() {

  const p = document.getElementById("panel");

  p.style.display =
    p.style.display === "block"
    ? "none"
    : "block";
}

/* ADD SHORTCUT */
function addShortcut() {

  const name =
    document.getElementById("name")
    .value
    .trim();

  const url =
    document.getElementById("url")
    .value
    .trim();

  if (!name || !url) {
    alert("Fill both fields");
    return;
  }

  saved[name] = url;

  localStorage.setItem(
    "jref_shortcuts",
    JSON.stringify(saved)
  );

  renderButtons();

  document.getElementById("name").value = "";
  document.getElementById("url").value = "";

  togglePanel();
}
</script>

</body>
</html>
