  <!DOCTYPE html>
<html>
<body style="margin:0; position:relative;">

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");

let elements = [];

/* ---------------- SAFE LOAD ---------------- */
try {
  if (id) {
    elements = JSON.parse(atob(id));
  } else {
    elements = JSON.parse(localStorage.getItem("jref_builder")) || [];
  }
} catch (e) {
  console.log("Load error:", e);
  elements = [];
}

/* ---------------- RENDER ---------------- */
elements.forEach(el => {

  const d = document.createElement("div");

  /* safe defaults */
  d.style.position = "absolute";
  d.style.left = (el.x || 0) + "px";
  d.style.top = (el.y || 0) + "px";
  d.style.width = (el.w || 100) + "px";

  /* ---------------- TYPES ---------------- */

  if (el.type === "link") {
    d.innerHTML = `<a href="${el.url || "#"}" target="_blank">${el.text || "link"}</a>`;
  }

  else if (el.type === "image") {
    d.innerHTML = `<img src="${el.src || ""}" style="width:100%; height:auto;" onerror="this.style.display='none'">`;
  }

  else if (el.type === "search") {
    d.innerHTML = `<input placeholder="Search..." style="width:100%;">`;
  }

  else if (el.type === "embed") {
    d.innerHTML = el.html || "";
  }

  else {
    d.innerHTML = "Unknown element";
  }

  document.body.appendChild(d);
});
</script>

</body>
</html>
