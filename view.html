<!DOCTYPE html>
<html>
<head>
<title>Jref View</title>

<style>
body {
  margin: 0;
  background: #eee;
  overflow: hidden;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let objects = [];

/* ---------------- SAFE DECODE ---------------- */
function decode() {
  if (!id) {
    objects = [{
      type: "text",
      x: 50,
      y: 80,
      text: "No data provided",
      size: 30,
      color: "red"
    }];
    return;
  }

  try {
    const json = atob(id);
    const parsed = JSON.parse(json);

    if (Array.isArray(parsed)) {
      objects = parsed;
    } else {
      throw new Error("Not array");
    }

  } catch (e) {
    console.log("Decode error:", e);

    objects = [{
      type: "text",
      x: 50,
      y: 80,
      text: "Invalid or corrupted data",
      size: 30,
      color: "red"
    }];
  }
}

decode();

/* ---------------- IMAGE CACHE ---------------- */
const cache = {};

function loadImage(src) {
  if (!cache[src]) {
    const img = new Image();
    img.src = src;
    cache[src] = img;
  }
  return cache[src];
}

/* ---------------- RENDER LOOP ---------------- */
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  objects.forEach(o => {

    /* IMAGE */
    if (o.type === "image") {
      const img = loadImage(o.src);

      if (img && img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, o.x, o.y, o.w, o.h);
      } else {
        // fallback (prevents blank screen)
        ctx.fillStyle = "red";
        ctx.fillRect(o.x, o.y, o.w, o.h);

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText("IMG", o.x + 5, o.y + 20);
      }
    }

    /* RECTANGLE */
    if (o.type === "rect") {
      ctx.fillStyle = o.color || "black";
      ctx.fillRect(o.x, o.y, o.w, o.h);
    }

    /* TEXT */
    if (o.type === "text") {
      ctx.fillStyle = o.color || "black";
      ctx.font = (o.size || 20) + "px Arial";
      ctx.fillText(o.text || "", o.x, o.y);
    }

  });

  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
