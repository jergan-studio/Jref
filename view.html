<!DOCTYPE html>
<html>
<head>
<title>View</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #e9e9e9;
}

.box {
  margin-top: 100px;
}
</style>
</head>

<body>

<div class="box">
  <h1>Loading...</h1>
  <p id="q"></p>

  <button onclick="goHome()">Home</button>
  <button onclick="searchGoogle()">Search Google</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const q = params.get("q");

document.getElementById("q").innerText = q;

function goHome() {
  location.href = "home.html";
}

function searchGoogle() {
  location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
}
</script>

</body>
</html>
