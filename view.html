<!DOCTYPE html>
<html>
<body>

<script>
const elements = JSON.parse(localStorage.getItem("jref_builder")) || [];

elements.forEach(el => {
  let div = document.createElement("div");

  div.style.position="absolute";
  div.style.left=el.x+"px";
  div.style.top=el.y+"px";
  div.style.width=el.w+"px";

  if(el.type==="link") div.innerHTML=`<a href="${el.url}">${el.text}</a>`;
  if(el.type==="image") div.innerHTML=`<img src="${el.src}" width="100%">`;
  if(el.type==="search") div.innerHTML=`<input placeholder="Search">`;
  if(el.type==="embed") div.innerHTML=el.html;

  document.body.appendChild(div);
});
</script>

</body>
</html>
