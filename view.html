<!DOCTYPE html>
<html>
<head>
<title>Jref View</title>

<style>
body {
  margin: 0;
  background: #eee;
  overflow: hidden;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let objects = [];

// decode base64 safely
function decodeData() {
  if (!id) return;

  try {
    const json = atob(id);
    objects = JSON.parse(json);
  } catch (e) {
    console.log("Decode error:", e);
    objects = [];
  }
}

decodeData();

// cache images (IMPORTANT fix for flickering/blank issue)
const imageCache = {};

function loadImage(src) {
  if (imageCache[src]) return imageCache[src];

  const img = new Image();
  img.src = src;
  imageCache[src] = img;
  return img;
}

// render loop
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  objects.forEach(obj => {

    // IMAGE
    if (obj.type === "image") {
      const img = loadImage(obj.src);

      if (img.complete) {
        ctx.drawImage(
          img,
          obj.x || 0,
          obj.y || 0,
          obj.w || 100,
          obj.h || 100
        );
      }
    }

    // RECTANGLE
    if (obj.type === "rect") {
      ctx.fillStyle = obj.color || "black";
      ctx.fillRect(obj.x || 0, obj.y || 0, obj.w || 50, obj.h || 50);
    }

    // TEXT
    if (obj.type === "text") {
      ctx.fillStyle = obj.color || "black";
      ctx.font = (obj.size || 20) + "px Arial";
      ctx.fillText(obj.text || "", obj.x || 0, obj.y || 0);
    }

  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
