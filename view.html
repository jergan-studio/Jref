<!DOCTYPE html>
<html>
<body>

<script>
const params=new URLSearchParams(location.search);
const id=params.get("id");

let elements=[];

if(id){
  elements=JSON.parse(atob(id));
}else{
  elements=JSON.parse(localStorage.getItem("jref_builder"))||[];
}

elements.forEach(el=>{
  let d=document.createElement("div");

  d.style.position="absolute";
  d.style.left=el.x+"px";
  d.style.top=el.y+"px";
  d.style.width=el.w+"px";

  if(el.type==="link") d.innerHTML=`<a href="${el.url}">${el.text}</a>`;
  if(el.type==="image") d.innerHTML=`<img src="${el.src}" width="100%">`;
  if(el.type==="search") d.innerHTML=`<input placeholder="Search">`;
  if(el.type==="embed") d.innerHTML=el.html;

  document.body.appendChild(d);
});
</script>

</body>
</html>
