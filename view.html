<script>
const params = new URLSearchParams(window.location.search);
let q = params.get("q");

// safety fix (handles empty + broken inputs)
if (!q || q === "null" || q === "undefined") {
  q = "";
}

document.getElementById("query").innerText = q;

if (q.trim() === "") {
  document.getElementById("status").innerText = "No search query";
} else {
  document.getElementById("status").innerText = "Results for:";
}

function googleSearch() {
  if (q.trim() !== "") {
    location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
  } else {
    location.href = "https://www.google.com";
  }
}
</script>
